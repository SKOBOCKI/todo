<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault Notes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="workspace">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">✦</div>
          <div>
            <h1>Vault</h1>
            <p>Spatiu de notite</p>
          </div>
        </div>

        <button id="new-note" class="primary-btn" type="button">
          + Notă nouă
        </button>

        <div class="sidebar-toolbar">
          <input id="filter" placeholder="Caută note..." />
        </div>

        <div id="note-list" class="note-list" role="list"></div>

        <div class="sidebar-actions">
          <button id="rename-note" type="button" disabled>Redenumire</button>
          <button id="delete-note" type="button" disabled>Șterge</button>
        </div>
      </aside>

      <main class="editor-shell">
        <header class="topbar">
          <div class="topbar-left">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div class="topbar-title" id="file-title">Selectează o notă</div>
          <div class="topbar-right">
            <span id="status" class="status"
              >Alege o pagină sau creează una nouă.</span
            >
          </div>
        </header>

        <section class="canvas-panel">
          <div
            id="canvas"
            class="canvas"
            contenteditable="true"
            spellcheck="false"
            aria-label="Editor text"
          ></div>
        </section>
      </main>
    </div>

    <script type="module" src="renderer.js"></script>
  </body>
</html>
